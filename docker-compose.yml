services:
  api:
    image: ghcr.io/edilsonnewbit/music-overflow-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    entrypoint: ["/app/entrypoint.sh"]
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      TZ: America/Recife
      PORT: 3001
      DATABASE_URL: postgresql://overflow:${POSTGRES_PASSWORD}@postgres:5432/overflow_music
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN}
      AUTH_BOOTSTRAP_MODE: ${AUTH_BOOTSTRAP_MODE}
      ADMIN_APPROVED_EMAILS: ${ADMIN_APPROVED_EMAILS}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health | grep -q '\"ok\":true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/edilsonnewbit/music-overflow-worker:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    environment:
      TZ: America/Recife
      DATABASE_URL: postgresql://overflow:${POSTGRES_PASSWORD}@postgres:5432/overflow_music
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/edilsonnewbit/music-overflow-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://music.overflowmvmt.com/api
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      AUTH_BOOTSTRAP_MODE: ${AUTH_BOOTSTRAP_MODE}
      WEB_LOGIN_FALLBACK_ENABLED: ${WEB_LOGIN_FALLBACK_ENABLED:-false}
      API_INTERNAL_URL: http://api:3001/api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.music-web.rule=Host(`music.overflowmvmt.com`)
      - traefik.http.routers.music-web.entrypoints=websecure
      - traefik.http.routers.music-web.tls.certresolver=letsencrypt
      - traefik.http.services.music-web.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: overflow_music
      POSTGRES_USER: overflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overflow -d overflow_music"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
