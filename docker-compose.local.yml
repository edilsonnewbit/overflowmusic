# docker-compose.local.yml — ambiente de desenvolvimento local com Docker Desktop
# Uso: docker compose -f docker-compose.local.yml up --build
# Acesso: http://localhost  (nginx na porta 80 roteia /api/* → api:3001 e /* → web:3000)
# API direta: http://localhost:3001
# Web direta: http://localhost:3000

services:

  # ─── Nginx local (sem SSL) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  # ─── NestJS API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://overflow:localpass@postgres:5432/overflow_music
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: local-admin-key
      JWT_SECRET: local-jwt-secret-change-in-prod
      FRONTEND_URL: http://localhost
      NEXT_PUBLIC_API_URL: http://localhost/api
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-}
      AUTH_BOOTSTRAP_MODE: "true"
      ADMIN_APPROVED_EMAILS: ${ADMIN_APPROVED_EMAILS:-admin@localhost}
    entrypoint: ["sh", "/app/entrypoint.sh"]
    volumes:
      # Monta o entrypoint sem reconstruir a imagem a cada mudança
      - ./apps/api/entrypoint.sh:/app/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  # ─── Next.js Web ────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # URL interna usada pelo server-api.ts (server-side Next.js)
      API_INTERNAL_URL: http://api:3001/api
      # URL pública usada pelo browser (via nginx ou porta direta)
      NEXT_PUBLIC_API_URL: http://localhost/api
      ADMIN_API_KEY: local-admin-key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AUTH_BOOTSTRAP_MODE: "true"
      WEB_LOGIN_FALLBACK_ENABLED: "true"
    depends_on:
      - api
    restart: on-failure

  # ─── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://overflow:localpass@postgres:5432/overflow_music
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: overflow_music
      POSTGRES_USER: overflow
      POSTGRES_PASSWORD: localpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overflow -d overflow_music"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_local:/data

volumes:
  postgres_local:
  redis_local:
